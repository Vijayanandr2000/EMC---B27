<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>

    <style>
      .container{
        display: grid;

        /* grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); */
        /* grid-template-rows: repeat(3, 1fr); */

        gap: 10px;

        height: 90vh;

        grid-template-areas:
          "l1 l2 l2 l3"
          "l1 l4 l5 l5"
          ;
      }

      .l1{
        grid-area: l1;
      }

      .l2{
        grid-area: l2;
      }

      .l3{
        grid-area: l3;
      }

      .l4{
        grid-area: l4;
      }

      .l5{
        grid-area: l5;
      }

      .item {
        background-color: coral;
        padding: 10px;
      }
    </style>
