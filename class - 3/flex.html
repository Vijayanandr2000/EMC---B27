<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex</title>
  <style>
    .container{
      display: flex;
      /* flex-direction: row; */
      gap:10px;
      /* flex-wrap: wrap; */
    }
    .item{
      background-color: coral;
      color: white;

      width: 200px;
      height: 200px;

    }

    .spl{
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="item ">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item spl">Item 3</div>
    <div class="item">Item 4</div>
    <div class="item">Item 5</div>
  </div>

</body>
</html>
